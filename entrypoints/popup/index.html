<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 220px;
            padding: 12px;
            font-family: sans-serif;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 6px;
            margin-bottom: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 8px;
            margin-bottom: 6px;
            cursor: pointer;
        }

        a {
            text-decoration: none;
            color: inherit;
            font-size: 10px;
            
        }
        a:hover {
            text-decoration: underline;
            color: #cc5200;
        }

        #status {
            margin-top: 8px;
            font-size: 12px;
            color: #555;
            min-height: 18px;
        }
        .danger { background: #ff4444; color: white; border: none; }
        .primary { background: #007bff; color: white; border: none; }
    </style>
</head>
<body>
    <h3>Prezi to PDF</h3>
    <label>Number of slides:</label>
    <input type="number" id="slideCount" min="1" value="" />
    <label>Delay per slide (ms):</label>
    <input type="number" id="delay" min="500" value="1500" />
    <button class="primary" id="startBtn">Start Capture</button>
    <button class="danger" id="clearBtn">Clear Saved Frames</button>
    <div id="status">Ready.</div>
    <a href="https://github.com/dewnan">by Dewnan Chamithka</a>
    <script type="module" src="./index.js"></script>
</body>
</html>
